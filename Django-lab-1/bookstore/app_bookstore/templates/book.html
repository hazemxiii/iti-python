{% extends "app-layout.html" %} {% block content %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-5">
          <h1 class="display-5 fw-bold mb-2">{{ book.title }}</h1>

          <p class="fs-5 text-muted fst-italic mb-4">{{ book.author }}</p>

          <hr />

          <div class="row g-4 mt-2">
            <div class="col-md-6">
              <small class="text-uppercase text-muted"> ISBN </small>

              <p class="fs-5 mb-0">{{ book.isbn }}</p>
            </div>

            <div class="col-md-6">
              <small class="text-uppercase text-muted"> Price </small>

              <p class="fs-3 fw-bold mb-0">${{ book.price }}</p>
            </div>
          </div>

          <div class="d-flex gap-2 mt-5">
            <a href="/books/update/{{ book.isbn }}" class="btn btn-dark">
              Update
            </a>

            <a
              href="/books/delete/{{ book.isbn }}"
              class="btn btn-outline-danger"
            >
              Delete
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
