{% extends "app-layout.html" %} {% block content %}

<div class="container py-5">
  <div
    class="d-flex flex-column flex-md-row justify-content-between align-items-md-center border-bottom pb-4 mb-5"
  >
    <div>
      <h1 class="display-4 fw-bold">My Library</h1>

      <p class="text-muted">A collection of books.</p>
    </div>

    <a href="/books/add" class="btn btn-dark px-4 py-2"> Add New Book </a>
  </div>

  <div class="row g-4">
    {% for book in books %}

    <div class="col-md-6 col-lg-4 col-xl-3">
      <div class="card h-100 border-0 shadow-sm">
        <div class="card-body">
          <h5 class="card-title fw-bold">{{ book.title }}</h5>

          <p class="text-muted fst-italic">{{ book.author }}</p>
        </div>

        <div class="card-footer bg-white">
          <small class="text-muted d-block"> ISBN {{ book.isbn }} </small>

          <h5 class="fw-bold mt-2">${{ book.price }}</h5>

          <div class="d-flex gap-2 mt-3">
            <a
              href="/book/{{ book.isbn }}"
              class="btn btn-outline-secondary btn-sm flex-fill"
            >
              View
            </a>

            <a
              href="/books/update/{{ book.isbn }}"
              class="btn btn-dark btn-sm flex-fill"
            >
              Update
            </a>

            <a
              href="/books/delete/{{ book.isbn }}"
              class="btn btn-outline-danger btn-sm"
            >
              Delete
            </a>
          </div>
        </div>
      </div>
    </div>

    {% endfor %}
  </div>
</div>

{% endblock %}
